<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reloj</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #080810;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Georgia', 'Times New Roman', serif;
    }

    .container {
      text-align: center;
      animation: fadeIn 2s ease;
      position: relative;
      z-index: 1;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .time-row {
      display: inline-flex;
      align-items: flex-end;
      line-height: 1;
    }

    .hh {
      font-size: 22vw;
      font-weight: 200;
      letter-spacing: 0.02em;
      color: #FFD700;
      text-shadow: 0 0 40px rgba(255, 215, 0, 0.3);
    }

    .colon {
      font-size: 22vw;
      font-weight: 200;
      color: #555540;
      animation: blink 1s step-end infinite;
      margin: 0 0.01em;
      line-height: 1;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.1; }
    }

    .mm-block {
      position: relative;
      display: inline-block;
    }

    .mm {
      font-size: 22vw;
      font-weight: 200;
      letter-spacing: 0.02em;
      color: #00FFFF;
      text-shadow: 0 0 40px rgba(0, 255, 255, 0.3);
      line-height: 1;
    }

    .ss {
      position: absolute;
      top: -1vw;
      right: -4vw;
      font-size: 5.5vw;
      font-weight: 300;
      color: #39FF14;
      text-shadow: 0 0 20px rgba(57, 255, 20, 0.5);
      letter-spacing: 0.05em;
      line-height: 1;
    }

    .divider {
      width: 50px;
      height: 1px;
      background: #2a2a3a;
      margin: 3vw auto 2.5vw;
    }

    .fecha {
      font-size: 4vw;
      color: #FF3333;
      text-shadow: 0 0 20px rgba(255, 50, 50, 0.3);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 300;
    }

    .dia {
      font-size: 3vw;
      color: #FF3333;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      margin-top: 1.5vw;
      font-weight: 300;
    }

    .stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--d) ease-in-out infinite;
      opacity: 0;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; }
      50%       { opacity: var(--o); }
    }
  </style>
</head>
<body>

  <div class="stars" id="stars"></div>

  <div class="container">
    <div class="time-row">
      <span class="hh" id="hh">00</span>
      <span class="colon">:</span>
      <span class="mm-block">
        <span class="ss" id="ss">00</span>
        <span class="mm" id="mm">00</span>
      </span>
    </div>
    <div class="divider"></div>
    <div class="fecha" id="fecha"></div>
    <div class="dia" id="dia"></div>
  </div>

  <script>
    var dias  = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    var meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
                 'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

    function pad(n){ return n < 10 ? '0'+n : ''+n; }

    function tick(){
      var now = new Date();
      document.getElementById('hh').textContent = pad(now.getHours());
      document.getElementById('mm').textContent = pad(now.getMinutes());
      document.getElementById('ss').textContent = pad(now.getSeconds());
      document.getElementById('fecha').textContent =
        now.getDate() + ' de ' + meses[now.getMonth()] + ' de ' + now.getFullYear();
      document.getElementById('dia').textContent = dias[now.getDay()];
    }

    tick();
    setInterval(tick, 1000);

    var starsDiv = document.getElementById('stars');
    for(var i = 0; i < 120; i++){
      var s = document.createElement('div');
      s.className = 'star';
      var size = Math.random() * 2 + 0.5;
      s.style.cssText = [
        'width:'  + size + 'px',
        'height:' + size + 'px',
        'top:'    + Math.random()*100 + '%',
        'left:'   + Math.random()*100 + '%',
        '--d:'    + (3 + Math.random()*6) + 's',
        '--o:'    + (0.3 + Math.random()*0.5),
        'animation-delay:' + Math.random()*8 + 's'
      ].join(';');
      starsDiv.appendChild(s);
    }
  </script>
</body>
</html>
